spring:
  application:
    name: rabbitmq-service

  datasource:
    url: jdbc:h2:mem:rabbitmqdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    template:
      default-receive-queue: rabbitmq-event-queue
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 2000
          max-attempts: 3
          multiplier: 1.5

rabbitmq:
  queue:
    name: rabbitmq-event-queue
  exchange:
    name: rabbitmq-event-exchange
  routing:
    key: rabbitmq-event-routing-key
  dlq:
    queue:
      name: rabbitmq-event-dlq
    exchange:
      name: rabbitmq-event-dlq-exchange
    routing:
      key: rabbitmq-event-dlq-routing-key

server:
  port: 8098

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Environment: Development
logging:
  level:
    root: INFO
    snvn.rabbitmqservice: DEBUG
    org.springframework.amqp: DEBUG
    com.rabbitmq: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

