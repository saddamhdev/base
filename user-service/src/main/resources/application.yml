spring:
  application:
    name: user-service

  datasource:
    url: jdbc:h2:mem:userdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: user-event-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

server:
  port: 8102

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    snvn: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

  file:
    name: logs/${spring.application.name}.log

  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 2GB

  pattern:
    console: >
      {"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSS}",
       "level":"%level",
       "service":"${spring.application.name}",
       "thread":"%thread",
       "traceId":"%X{traceId:-}",
       "spanId":"%X{spanId:-}",
       "correlationId":"%X{correlationId:-}",
       "jobId":"%X{jobId:-}",
       "logger":"%logger{36}",
       "message":"%msg",
       "exception":"%replace(%ex){'\n','\\\\n'}"}%n

    file: >
      {"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSS}",
       "level":"%level",
       "service":"${spring.application.name}",
       "thread":"%thread",
       "traceId":"%X{traceId:-}",
       "spanId":"%X{spanId:-}",
       "correlationId":"%X{correlationId:-}",
       "jobId":"%X{jobId:-}",
       "logger":"%logger{36}",
       "message":"%msg",
       "exception":"%replace(%ex){'\n','\\\\n'}"}%n