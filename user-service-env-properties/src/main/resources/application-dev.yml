spring:
  config:
    import:
      - "optional:classpath:splunk-hec-dev.yml"
      - "optional:classpath:redis-shared-dev.yml"
      - "optional:classpath:log-file-dev.yml"
      - "optional:classpath:application-rabbitmq-dev.yml"
      - "optional:classpath:application-kafka-dev.yml"
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:6062/realms/snvn


  datasource:
    url: jdbc:h2:mem:userdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: user-event-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"


service-log:
  logfile:
    enabled: false
  splunk:
    enabled: false
  rabbitmq:
    enabled: false
  kafka:
    enabled: true


security:
  provider: keycloak   # keycloak | okta | auth0 | azure | custom | ldap

  keycloak:
    enabled: true
    issuer-uri: http://localhost:6062/realms/snvn

  okta:
    enabled: false
    issuer-uri: https://dev-123456.okta.com/oauth2/default

  auth0:
    enabled: false
    issuer-uri: https://your-tenant.us.auth0.com/

  azure:
    enabled: false
    issuer-uri: https://login.microsoftonline.com/<tenant-id>/v2.0

  custom:
    enabled: false
    issuer-uri: https://idp.example.com
    jwk-set-uri: https://idp.example.com/.well-known/jwks.json

  ldap:
    enabled: false
    url: ldap://localhost:389
    base-dn: dc=example,dc=com
    user-dn-pattern: uid={0},ou=people
    manager-dn: cn=admin,dc=example,dc=com
    manager-password: secret

  mtls:
    enabled: false
    trust-store: classpath:certs/truststore.jks
    trust-store-password: changeit

  api-key:
    enabled: true
    header: X-API-KEY
    value: my-secret-key

  rate-limit:
    enabled: true
    requests-per-minute: 2

  ip-filter:
    enabled: false



incoming-ip-whitelist:
  enabled: true

  allowed-ips:

    - service: gateway-service
      enabled: true
      address: 127.0.0.1
      protocol: tcp
      portStart: 0
      portEnd: 65535

    - service: account-service
      enabled: true
      address: 10.0.1.20
      protocol: tcp
      portStart: 8081
      portEnd: 8081

    - service: fraud-service
      enabled: false   # disabled service
      address: 10.0.1.30
      protocol: tcp
      portStart: 8082
      portEnd: 8082


outgoing-ip-whitelist:
  enabled: true

  allowed-targets:

    - service: account-service
      enabled: true
      address: 10.0.1.20
      protocol: http
      portStart: 8081
      portEnd: 8081

    - service: fraud-service
      enabled: true
      address: 10.0.1.30
      protocol: http
      portStart: 8082
      portEnd: 8082