spring:
  application:
    name: kafka-service

  datasource:
    url: jdbc:postgresql://prod-db-cluster.yourdomain.com:5432/kafkadb
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  h2:
    console:
      enabled: false

  kafka:
    bootstrap-servers: prod-kafka-1.yourdomain.com:9092,prod-kafka-2.yourdomain.com:9092,prod-kafka-3.yourdomain.com:9092
    consumer:
      group-id: kafka-event-group-prod
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        max.poll.records: 500
        max.poll.interval.ms: 300000
        session.timeout.ms: 45000
        heartbeat.interval.ms: 15000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 10
      properties:
        max.in.flight.requests.per.connection: 5
        enable.idempotence: true
        compression.type: snappy
        linger.ms: 10
        batch.size: 32768
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: PLAIN
      sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_USERNAME}" password="${KAFKA_PASSWORD}";
      ssl.endpoint.identification.algorithm: https

kafka:
  topic:
    name: kafka-event-topic-prod

server:
  port: 8097
  compression:
    enabled: true
    min-response-size: 1024
  ssl:
    enabled: true
    key-store: ${SSL_KEYSTORE_PATH}
    key-store-password: ${SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true

# Environment: Production
logging:
  level:
    root: ERROR
    snvn.kafkaservice: WARN
    org.springframework.kafka: WARN
    org.apache.kafka: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/kafka-service/application.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 3GB

