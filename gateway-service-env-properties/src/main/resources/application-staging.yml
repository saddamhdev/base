spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: user-service-route
          uri: http://staging-user-service:8081
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<segment>.*), /api/$\{segment}
            - AddRequestHeader=X-Service, user-service

        - id: config-service-route
          uri: http://staging-config-service:8888
          predicates:
            - Path=/config/**
          filters:
            - AddRequestHeader=X-Service, config-service

        - id: main-service-route
          uri: http://staging-main-service:3081
          predicates:
            - Path=/**
          filters:
            - AddRequestHeader=X-Service, main-service

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "https://staging.yourdomain.com"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 7200

server:
  port: 8093
  servlet:
    context-path: /gateway
  compression:
    enabled: true
    min-response-size: 1024

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://staging-eureka:8761/eureka/

# Environment: Staging
logging:
  level:
    root: WARN
    snvn: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

