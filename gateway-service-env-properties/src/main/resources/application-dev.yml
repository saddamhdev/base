spring:
  application:
    name: gateway-service
  config:
    import:
      - "optional:classpath:splunk-hec-dev.yml"
      - "optional:classpath:redis-shared-dev.yml"
      - "optional:classpath:log-file-dev.yml"
      - "optional:classpath:application-rabbitmq-dev.yml"
      - "optional:classpath:application-kafka-dev.yml"
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:6062/realms/snvn

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8102
          predicates:
            - Path=/api/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: userServiceCB
                fallbackUri: forward:/fallback


        - id: auth-service
          uri: http://localhost:8096
          predicates:
            - Path=/api/auth/**
          filters:
            - name: AddRequestHeader
              args:
                name: X-Auth-Request
                value: "true"
            - name: CircuitBreaker
              args:
                name: authServiceCB
                fallbackUri: forward:/fallback
        - id: account-service
          uri: http://localhost:8095
          predicates:
            - Path=/api/accounts/**
          filters:
            - name: CircuitBreaker
              args:
                name: accountServiceCB
                fallbackUri: forward:/fallback
        - id: transaction-service
          uri: http://localhost:8101
          predicates:
            - Path=/api/transactions/**
          filters:
            - name: CircuitBreaker
              args:
                name: transactionServiceCB
                fallbackUri: forward:/fallback
        - id: notification-service
          uri: http://localhost:8100
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notificationServiceCB
                fallbackUri: forward:/fallback
        - id: audit-service
          uri: http://localhost:8099
          predicates:
            - Path=/api/audit/**
          filters:
            - name: CircuitBreaker
              args:
                name: auditServiceCB
                fallbackUri: forward:/fallback
        - id: kafka-service
          uri: http://localhost:8097
          predicates:
            - Path=/api/kafka/**
          filters:
            - name: CircuitBreaker
              args:
                name: kafkaServiceCB
                fallbackUri: forward:/fallback
        - id: rabbitmq-service
          uri: http://localhost:8098
          predicates:
            - Path=/api/rabbitmq/**
          filters:
            - name: CircuitBreaker
              args:
                name: rabbitmqServiceCB
                fallbackUri: forward:/fallback
        - id: config-service
          uri: http://localhost:8092
          predicates:
            - Path=/config/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:8093"
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - "Content-Type"
              - "Authorization"
            allowCredentials: false
            maxAge: 3600

  data:
    redis:
      host: localhost
      port: 6379
      password: '@#12345678'

# Resilience4j Configuration (must be at root level, not under spring)
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10000
        failureRateThreshold: 70
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 30000
    instances:
      userServiceCB:
        baseConfig: default
      authServiceCB:
        baseConfig: default
      accountServiceCB:
        baseConfig: default
      transactionServiceCB:
        baseConfig: default
      notificationServiceCB:
        baseConfig: default
      auditServiceCB:
        baseConfig: default
      kafkaServiceCB:
        baseConfig: default
      rabbitmqServiceCB:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 30s
        cancelRunningFuture: true
    instances:
      userServiceCB:
        baseConfig: default
      authServiceCB:
        baseConfig: default
      accountServiceCB:
        baseConfig: default
      transactionServiceCB:
        baseConfig: default
      notificationServiceCB:
        baseConfig: default
      auditServiceCB:
        baseConfig: default
      kafkaServiceCB:
        baseConfig: default
      rabbitmqServiceCB:
        baseConfig: default

server:
  port: 8093
  servlet:
    context-path: /gateway

eureka:
  client:
    enabled: false

service-log:
  logfile:
    enabled: false
  splunk:
    enabled: false
  rabbitmq:
    enabled: false
  kafka:
    enabled: true

rabbitmq-service-log:
  auto-startup: false

security:
  keycloak:
    enabled: true

  api-key:
    enabled: true
    header: X-API-KEY
    value: my-secret-key

  rate-limit:
    enabled: true
    requests-per-minute: 2

  ip-filter:
    enabled: false


incoming-ip-whitelist:
  enabled: true

  allowed-ips:

    - service: gateway-service
      enabled: true
      address: 0:0:0:0:0:0:0:1
      protocol: tcp
      portStart: 0
      portEnd: 65535

    - service: account-service
      enabled: true
      address: 10.0.1.20
      protocol: tcp
      portStart: 8081
      portEnd: 8081

    - service: fraud-service
      enabled: false   # disabled service
      address: 10.0.1.30
      protocol: tcp
      portStart: 8082
      portEnd: 8082