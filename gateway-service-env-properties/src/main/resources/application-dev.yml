spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: main-service-users
          uri: http://localhost:8094
          predicates:
            - Path=/api/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: mainServiceCB
                fallbackUri: forward:/fallback
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAddressKeyResolver}"
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
        - id: main-service-auth
          uri: http://localhost:8094
          predicates:
            - Path=/api/auth/**
          filters:
            - name: AddRequestHeader
              args:
                name: X-Auth-Request
                value: "true"
            - name: CircuitBreaker
              args:
                name: mainServiceCB
                fallbackUri: forward:/fallback
        - id: main-service-accounts
          uri: http://localhost:8094
          predicates:
            - Path=/api/accounts/**
        - id: main-service-transactions
          uri: http://localhost:8094
          predicates:
            - Path=/api/transactions/**
        - id: config-service
          uri: http://localhost:8092
          predicates:
            - Path=/config/**
        - id: main-service-default
          uri: http://localhost:8094
          predicates:
            - Path=/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:8093"
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - "Content-Type"
              - "Authorization"
            allowCredentials: false
            maxAge: 3600

  data:
    redis:
      host: localhost
      port: 6379
      password: '@#12345678'

  # Resilience4j Configuration for Circuit Breaker
  resilience4j:
    circuitbreaker:
      configs:
        default:
          registerHealthIndicator: true
          slidingWindowSize: 20
          minimumNumberOfCalls: 10
          automaticTransitionFromOpenToHalfOpenEnabled: true
          waitDurationInOpenState: 10000
          failureRateThreshold: 70
          slowCallRateThreshold: 100
          slowCallDurationThreshold: 5000
      instances:
        mainServiceCB:
          baseConfig: default

server:
  port: 8093
  servlet:
    context-path: /gateway

eureka:
  client:
    enabled: false

