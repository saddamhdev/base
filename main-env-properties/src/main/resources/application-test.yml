spring:
  application:
    name: main-service

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8094
  servlet:
    context-path: /api

# =================================
# Microservice URLs Configuration
# =================================
services:
  clients:
    user-service:
      name: user-service
      bean-name: userServiceClient
      url: http://localhost:3089
      connect-timeout: 3000
      read-timeout: 5000
    auth-service:
      name: auth-service
      bean-name: authServiceClient
      url: http://localhost:3083
      connect-timeout: 3000
      read-timeout: 5000
    account-service:
      name: account-service
      bean-name: accountServiceClient
      url: http://localhost:3082
      connect-timeout: 3000
      read-timeout: 5000
    transaction-service:
      name: transaction-service
      bean-name: transactionServiceClient
      url: http://localhost:3088
      connect-timeout: 3000
      read-timeout: 5000
    notification-service:
      name: notification-service
      bean-name: notificationServiceClient
      url: http://localhost:3087
      connect-timeout: 3000
      read-timeout: 5000
    audit-service:
      name: audit-service
      bean-name: auditServiceClient
      url: http://localhost:3086
      connect-timeout: 3000
      read-timeout: 5000
    kafka-service:
      name: kafka-service
      bean-name: kafkaServiceClient
      url: http://localhost:3084
      connect-timeout: 3000
      read-timeout: 5000
    rabbitmq-service:
      name: rabbitmq-service
      bean-name: rabbitmqServiceClient
      url: http://localhost:3085
      connect-timeout: 3000
      read-timeout: 5000

# Environment: Test
logging:
  level:
    root: DEBUG
    snvn: DEBUG
    org.hibernate.SQL: DEBUG

  pattern:
    console: >
      {"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSS}",
       "level":"%level",
       "service":"${spring.application.name}",
       "thread":"%thread",
       "traceId":"%X{traceId:-}",
       "spanId":"%X{spanId:-}",
       "correlationId":"%X{correlationId:-}",
       "jobId":"%X{jobId:-}",
       "logger":"%logger{36}",
       "message":"%msg",
       "exception":"%replace(%ex){'\n','\\\\n'}"}%n

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

