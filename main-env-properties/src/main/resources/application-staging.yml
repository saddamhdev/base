spring:
  application:
    name: main-service

  datasource:
    url: jdbc:mysql://staging-mysql:3306/main_db
    driverClassName: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  port: 8094
  servlet:
    context-path: /api
  compression:
    enabled: true
    min-response-size: 1024

# =================================
# Microservice URLs Configuration
# =================================
services:
  clients:
    user-service:
      name: user-service
      bean-name: userServiceClient
      url: ${USER_SERVICE_URL:http://user-service:8102}
      connect-timeout: 5000
      read-timeout: 12000
    auth-service:
      name: auth-service
      bean-name: authServiceClient
      url: ${AUTH_SERVICE_URL:http://auth-service:8096}
      connect-timeout: 5000
      read-timeout: 12000
    account-service:
      name: account-service
      bean-name: accountServiceClient
      url: ${ACCOUNT_SERVICE_URL:http://account-service:8095}
      connect-timeout: 5000
      read-timeout: 12000
    transaction-service:
      name: transaction-service
      bean-name: transactionServiceClient
      url: ${TRANSACTION_SERVICE_URL:http://transaction-service:8101}
      connect-timeout: 5000
      read-timeout: 12000
    notification-service:
      name: notification-service
      bean-name: notificationServiceClient
      url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8100}
      connect-timeout: 5000
      read-timeout: 12000
    audit-service:
      name: audit-service
      bean-name: auditServiceClient
      url: ${AUDIT_SERVICE_URL:http://audit-service:8099}
      connect-timeout: 5000
      read-timeout: 12000
    kafka-service:
      name: kafka-service
      bean-name: kafkaServiceClient
      url: ${KAFKA_SERVICE_URL:http://kafka-service:8097}
      connect-timeout: 5000
      read-timeout: 12000
    rabbitmq-service:
      name: rabbitmq-service
      bean-name: rabbitmqServiceClient
      url: ${RABBITMQ_SERVICE_URL:http://rabbitmq-service:8098}
      connect-timeout: 5000
      read-timeout: 12000

# Environment: Staging
logging:
  level:
    root: WARN
    snvn: INFO

  file:
    name: logs/${spring.application.name}.log

  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 15
      total-size-cap: 2GB

  pattern:
    console: >
      {"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSS}",
       "level":"%level",
       "service":"${spring.application.name}",
       "thread":"%thread",
       "traceId":"%X{traceId:-}",
       "spanId":"%X{spanId:-}",
       "correlationId":"%X{correlationId:-}",
       "jobId":"%X{jobId:-}",
       "logger":"%logger{36}",
       "message":"%msg",
       "exception":"%replace(%ex){'\n','\\\\n'}"}%n

    file: >
      {"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSS}",
       "level":"%level",
       "service":"${spring.application.name}",
       "thread":"%thread",
       "traceId":"%X{traceId:-}",
       "spanId":"%X{spanId:-}",
       "correlationId":"%X{correlationId:-}",
       "jobId":"%X{jobId:-}",
       "logger":"%logger{36}",
       "message":"%msg",
       "exception":"%replace(%ex){'\n','\\\\n'}"}%n

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  metrics:
    export:
      simple:
        enabled: true

