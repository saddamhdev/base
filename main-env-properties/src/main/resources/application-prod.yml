spring:
  application:
    name: main-service

  datasource:
    url: jdbc:mysql://prod-mysql:3306/main_db_prod
    driverClassName: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true

server:
  port: 8094
  servlet:
    context-path: /api
  compression:
    enabled: true
    min-response-size: 1024
  ssl:
    enabled: true
    key-store: ${SSL_KEYSTORE_PATH}
    key-store-password: ${SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12

# =================================
# Microservice URLs Configuration
# =================================
services:
  clients:
    user-service:
      name: user-service
      bean-name: userServiceClient
      url: ${USER_SERVICE_URL:http://user-service:8102}
      connect-timeout: 5000
      read-timeout: 15000
    auth-service:
      name: auth-service
      bean-name: authServiceClient
      url: ${AUTH_SERVICE_URL:http://auth-service:8096}
      connect-timeout: 5000
      read-timeout: 15000
    account-service:
      name: account-service
      bean-name: accountServiceClient
      url: ${ACCOUNT_SERVICE_URL:http://account-service:8095}
      connect-timeout: 5000
      read-timeout: 15000
    transaction-service:
      name: transaction-service
      bean-name: transactionServiceClient
      url: ${TRANSACTION_SERVICE_URL:http://transaction-service:8101}
      connect-timeout: 5000
      read-timeout: 15000
    notification-service:
      name: notification-service
      bean-name: notificationServiceClient
      url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8100}
      connect-timeout: 5000
      read-timeout: 15000
    audit-service:
      name: audit-service
      bean-name: auditServiceClient
      url: ${AUDIT_SERVICE_URL:http://audit-service:8099}
      connect-timeout: 5000
      read-timeout: 15000
    kafka-service:
      name: kafka-service
      bean-name: kafkaServiceClient
      url: ${KAFKA_SERVICE_URL:http://kafka-service:8097}
      connect-timeout: 5000
      read-timeout: 15000
    rabbitmq-service:
      name: rabbitmq-service
      bean-name: rabbitmqServiceClient
      url: ${RABBITMQ_SERVICE_URL:http://rabbitmq-service:8098}
      connect-timeout: 5000
      read-timeout: 15000

# Environment: Production
logging:
  level:
    root: ERROR
    snvn: WARN

  file:
    name: /var/log/main-service/application.log

  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 5GB

  pattern:
    console: >
      {"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSS}",
       "level":"%level",
       "service":"${spring.application.name}",
       "thread":"%thread",
       "traceId":"%X{traceId:-}",
       "spanId":"%X{spanId:-}",
       "correlationId":"%X{correlationId:-}",
       "jobId":"%X{jobId:-}",
       "logger":"%logger{36}",
       "message":"%msg",
       "exception":"%replace(%ex){'\n','\\\\n'}"}%n

    file: >
      {"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSS}",
       "level":"%level",
       "service":"${spring.application.name}",
       "thread":"%thread",
       "traceId":"%X{traceId:-}",
       "spanId":"%X{spanId:-}",
       "correlationId":"%X{correlationId:-}",
       "jobId":"%X{jobId:-}",
       "logger":"%logger{36}",
       "message":"%msg",
       "exception":"%replace(%ex){'\n','\\\\n'}"}%n

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# Production application settings
app:
  cache:
    enabled: true
    ttl: 3600
  rate-limiting:
    enabled: true
    requests-per-minute: 1000

